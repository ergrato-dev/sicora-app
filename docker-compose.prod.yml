# =============================================================================
# SICORA - Production Docker Compose
# Stack completo para VPS Hostinger KVM1 (4GB RAM, 1 vCPU)
# =============================================================================

services:
  # ==========================================================================
  # Frontend - Nginx serving React SPA
  # ==========================================================================
  frontend:
    build:
      context: ./sicora-app-fe
      dockerfile: Dockerfile
    container_name: sicora-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend-go:
        condition: service_healthy
      backend-python:
        condition: service_healthy
    networks:
      - sicora-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    labels:
      - "com.sicora.service=frontend"

  # ==========================================================================
  # Backend Go - Microservicios consolidados
  # ==========================================================================
  backend-go:
    build:
      context: ./sicora-be-go
      dockerfile: Dockerfile
    container_name: sicora-backend-go
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-sicora_prod}
      - DB_USER=${POSTGRES_USER:-sicora}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-sicora_secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sicora-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.sicora.service=backend-go"

  # ==========================================================================
  # Backend Python - FastAPI
  # ==========================================================================
  backend-python:
    build:
      context: ./sicora-be-python
      dockerfile: Dockerfile
    container_name: sicora-backend-python
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sicora}:${POSTGRES_PASSWORD:-sicora_secret}@postgres:5432/${POSTGRES_DB:-sicora_prod}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sicora-network
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.sicora.service=backend-python"

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: sicora-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sicora_prod}
      - POSTGRES_USER=${POSTGRES_USER:-sicora}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sicora_secret}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sicora-infra/docker/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - sicora-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sicora} -d ${POSTGRES_DB:-sicora_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.sicora.service=database"

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: sicora-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sicora-network
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.sicora.service=cache"

# =============================================================================
# Networks
# =============================================================================
networks:
  sicora-network:
    driver: bridge
    name: sicora-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: sicora-postgres-data
  redis_data:
    name: sicora-redis-data
