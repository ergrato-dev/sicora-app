    <text x="210" y="135" text-anchor="middle" class="cell-text">6</text>
    <text x="210" y="155" text-anchor="middle" class="risk-id">RA-003 ⏳</text>
    <text x="210" y="170" text-anchor="middle" class="risk-id">RA-010 ⏳</text>
    
    <!-- Alto (9) - High -->
    <rect x="280" y="100" width="140" height="100" class="high cell-border"/>
    <text x="350" y="135" text-anchor="middle" class="cell-text">9</text>
    <text x="350" y="155" text-anchor="middle" class="risk-id">RC-005 ✓</text>
    <text x="350" y="170" text-anchor="middle" class="risk-id">RA-001 ✓</text>
    <text x="350" y="185" text-anchor="middle" class="risk-id">RA-002 ⏳</text>
    
    <!-- Crítico (12) - Critical -->
    <rect x="420" y="100" width="140" height="100" class="critical cell-border"/>
    <text x="490" y="135" text-anchor="middle" class="cell-text">12</text>
    <text x="490" y="155" text-anchor="middle" class="risk-id">RC-002 ✓</text>
    <text x="490" y="170" text-anchor="middle" class="risk-id">RC-003 ✓</text>
    <text x="490" y="185" text-anchor="middle" class="risk-id">RC-006 ✓</text>
    
    <!-- Row 3: Probabilidad Baja (2) -->
