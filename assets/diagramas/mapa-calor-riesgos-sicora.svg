<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" fill="none">
  <style>
    .title { font: bold 24px 'Segoe UI', sans-serif; fill: #E0E0E0; }
    .subtitle { font: 14px 'Segoe UI', sans-serif; fill: #9E9E9E; }
    .axis-label { font: bold 14px 'Segoe UI', sans-serif; fill: #B0BEC5; }
    .cell-text { font: bold 12px 'Segoe UI', sans-serif; fill: #FFFFFF; }
    .risk-id { font: 10px 'Segoe UI', sans-serif; fill: #FFFFFF; }
    .legend-text { font: 12px 'Segoe UI', sans-serif; fill: #B0BEC5; }
    .legend-title { font: bold 14px 'Segoe UI', sans-serif; fill: #E0E0E0; }
    .stat-value { font: bold 28px 'Segoe UI', sans-serif; fill: #E0E0E0; }
    .stat-label { font: 11px 'Segoe UI', sans-serif; fill: #9E9E9E; }
    .box-bg { fill: #1E1E1E; stroke: #424242; stroke-width: 1; }
    .critical { fill: #B71C1C; }
    .high { fill: #E65100; }
    .medium { fill: #F9A825; }
    .low { fill: #2E7D32; }
    .cell-border { stroke: #424242; stroke-width: 1; }
    .mitigated { stroke: #4CAF50; stroke-width: 3; stroke-dasharray: none; }
    .pending { stroke: #FF9800; stroke-width: 3; stroke-dasharray: 5,3; }
  </style>
  
  <!-- Background -->
  <rect width="1100" height="800" fill="#121212"/>
  
