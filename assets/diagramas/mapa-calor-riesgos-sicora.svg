    <text x="210" y="45" text-anchor="middle" class="cell-text">8</text>
    <text x="210" y="65" text-anchor="middle" class="risk-id">RA-005 ✓</text>
    
    <!-- Alto (12) - Critical -->
    <rect x="280" y="0" width="140" height="100" class="critical cell-border"/>
