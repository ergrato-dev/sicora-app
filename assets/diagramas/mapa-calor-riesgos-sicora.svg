    <text x="350" y="235" text-anchor="middle" class="cell-text">6</text>
    <text x="350" y="255" text-anchor="middle" class="risk-id">RA-04 ✓</text>
    <text x="350" y="270" text-anchor="middle" class="risk-id">RA-06 ✓</text>
