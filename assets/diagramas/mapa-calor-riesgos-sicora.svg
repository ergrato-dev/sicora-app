    <rect x="30" y="50" width="160" height="25" fill="#EF5350" rx="3"/>
    <text x="35" y="68" class="legend-text" style="fill: #FFF;">Seguridad</text>
    <text x="200" y="68" text-anchor="end" class="legend-text" style="fill: #FFF;">16</text>
    
    <!-- Disponibilidad -->
    <rect x="30" y="85" width="200" height="25" fill="#263238" rx="3"/>
    <rect x="30" y="85" width="100" height="25" fill="#42A5F5" rx="3"/>
    <text x="35" y="103" class="legend-text" style="fill: #FFF;">Disponibilidad</text>
    <text x="120" y="103" text-anchor="end" class="legend-text" style="fill: #FFF;">8</text>
    
    <!-- Integridad -->
    <rect x="30" y="120" width="200" height="25" fill="#263238" rx="3"/>
    <rect x="30" y="120" width="75" height="25" fill="#AB47BC" rx="3"/>
    <text x="35" y="138" class="legend-text" style="fill: #FFF;">Integridad</text>
    <text x="95" y="138" text-anchor="end" class="legend-text" style="fill: #FFF;">6</text>
    
    <!-- Técnico -->
    <rect x="270" y="50" width="200" height="25" fill="#263238" rx="3"/>
    <rect x="270" y="50" width="100" height="25" fill="#66BB6A" rx="3"/>
    <text x="275" y="68" class="legend-text" style="fill: #FFF;">Técnico</text>
    <text x="360" y="68" text-anchor="end" class="legend-text" style="fill: #FFF;">8</text>
    
    <!-- Rendimiento -->
    <rect x="270" y="85" width="200" height="25" fill="#263238" rx="3"/>
    <rect x="270" y="85" width="50" height="25" fill="#FFA726" rx="3"/>
    <text x="275" y="103" class="legend-text" style="fill: #FFF;">Rendimiento</text>
    <text x="310" y="103" text-anchor="end" class="legend-text" style="fill: #FFF;">4</text>
    
    <!-- Continuidad -->
    <rect x="270" y="120" width="200" height="25" fill="#263238" rx="3"/>
    <rect x="270" y="120" width="38" height="25" fill="#26C6DA" rx="3"/>
    <text x="275" y="138" class="legend-text" style="fill: #FFF;">Continuidad</text>
    <text x="300" y="138" text-anchor="end" class="legend-text" style="fill: #FFF;">3</text>
    
    <!-- Top 5 Risks -->
    <g transform="translate(520, 40)">
      <text x="200" y="10" text-anchor="middle" class="legend-title">🔥 Top 5 Riesgos Activos</text>
      
      <rect x="0" y="25" width="400" height="28" fill="#B71C1C" rx="3"/>
      <text x="10" y="45" class="legend-text" style="fill: #FFF;">RC-004: Fallo PostgreSQL (Replica pendiente)</text>
      <text x="380" y="45" text-anchor="end" class="risk-id">⏳ 8</text>
      
      <rect x="0" y="58" width="400" height="28" fill="#E65100" rx="3"/>
      <text x="10" y="78" class="legend-text" style="fill: #FFF;">RA-002: Performance bajo carga (Cache pendiente)</text>
      <text x="380" y="78" text-anchor="end" class="risk-id">⏳ 9</text>
      
      <rect x="0" y="91" width="400" height="28" fill="#F9A825" rx="3"/>
      <text x="10" y="111" class="legend-text" style="fill: #212121;">RA-003: NotificationService retry (Pendiente)</text>
      <text x="380" y="111" text-anchor="end" class="risk-id" style="fill: #212121;">⏳ 6</text>
      
      <rect x="0" y="124" width="400" height="28" fill="#F9A825" rx="3"/>
      <text x="10" y="144" class="legend-text" style="fill: #212121;">RM-003: Load testing (No implementado)</text>
      <text x="380" y="144" text-anchor="end" class="risk-id" style="fill: #212121;">⏳ 6</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="550" y="770" text-anchor="middle" class="subtitle">SICORA - Sistema de Información de Coordinación Académica | Versión 1.0 | Enero 2026</text>
