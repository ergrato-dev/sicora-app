    <rect x="0" y="200" width="140" height="100" class="low cell-border"/>
    <text x="70" y="255" text-anchor="middle" class="cell-text">2</text>
    
    <!-- Bajo (4) - Low -->
    <rect x="140" y="200" width="140" height="100" class="low cell-border"/>
    <text x="210" y="245" text-anchor="middle" class="cell-text">4</text>
    <text x="210" y="265" text-anchor="middle" class="risk-id">RA-12 ✓</text>
    
