    <text x="490" y="235" text-anchor="middle" class="cell-text">8</text>
    <text x="490" y="255" text-anchor="middle" class="risk-id">RC-004 ⏳</text>
    <text x="490" y="270" text-anchor="middle" class="risk-id">RC-008 ✓</text>
    <text x="490" y="285" text-anchor="middle" class="risk-id">RA-007 ✓</text>
    
