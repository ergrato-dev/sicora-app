<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    🗄️ Arquitectura Redis Cache - Servicios Go SICORA
  </text>
  
  <!-- Legend -->
  <rect x="20" y="60" width="200" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="30" y="85" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LEYENDA</text>
  <circle cx="40" cy="105" r="6" fill="#22c55e"/>
  <text x="55" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Cache Hit (Redis)</text>
  <circle cx="40" cy="130" r="6" fill="#ef4444"/>
  <text x="55" y="135" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Cache Miss → DB</text>
  <circle cx="40" cy="155" r="6" fill="#6366f1"/>
  <text x="55" y="160" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Write-through</text>
  
  <!-- Client -->
  <rect x="50" y="250" width="120" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="110" y="285" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="14" font-weight="bold">👤 Cliente</text>
  
  <!-- API Gateway -->
  <rect x="250" y="230" width="140" height="100" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="320" y="265" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="13" font-weight="bold">API Gateway</text>
  <text x="320" y="285" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="11">(Go)</text>
  <text x="320" y="310" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Rate Limit</text>
  
  <!-- Arrow Client to Gateway -->
  <line x1="170" y1="280" x2="245" y2="280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Redis Central -->
  <rect x="500" y="200" width="200" height="160" rx="12" fill="#7f1d1d" stroke="#ef4444" stroke-width="3"/>
  <text x="600" y="235" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="18" font-weight="bold">🔴 Redis 7</text>
  <text x="600" y="260" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="12">Cache Central</text>
  <line x1="520" y1="275" x2="680" y2="275" stroke="#991b1b" stroke-width="1"/>
  <text x="520" y="295" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10">• scheduleservice:*</text>
  <text x="520" y="312" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10">• userservice:*</text>
  <text x="520" y="329" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10">• kbservice:*</text>
  <text x="520" y="346" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10">• evalinservice:*</text>
  
  <!-- PostgreSQL -->
  <rect x="500" y="450" width="200" height="120" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="3"/>
  <text x="600" y="490" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18" font-weight="bold">🐘 PostgreSQL</text>
  <text x="600" y="515" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="12">Source of Truth</text>
  <text x="600" y="545" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">schedule_db | user_db | kb_db</text>
  
  <!-- Services Column -->
  <!-- ScheduleService -->
  <rect x="800" y="120" width="160" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="150" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📅 ScheduleService</text>
  <text x="880" y="170" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">TTL: 1h-24h</text>
  <text x="880" y="188" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Campus, Programs, Groups</text>
  
  <!-- UserService -->
  <rect x="800" y="220" width="160" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="250" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">👥 UserService</text>
  <text x="880" y="270" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">TTL: 30min-1h</text>
  <text x="880" y="288" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Users, Profiles, Roles</text>
  
  <!-- KbService -->
  <rect x="800" y="320" width="160" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="350" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📚 KbService</text>
  <text x="880" y="370" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">TTL: 30min-12h</text>
  <text x="880" y="388" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">FAQs, Categories, Search</text>
  
  <!-- EvalinService -->
  <rect x="800" y="420" width="160" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="450" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📝 EvalinService</text>
  <text x="880" y="470" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">TTL: 1h-6h</text>
  <text x="880" y="488" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Templates, Criteria</text>
  
  <!-- MevalService -->
  <rect x="800" y="520" width="160" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="550" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">⚖️ MevalService</text>
  <text x="880" y="570" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">TTL: 6h-12h</text>
  <text x="880" y="588" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Fault Types, Config</text>
  
  <!-- AttendanceService (No Cache) -->
  <rect x="800" y="620" width="160" height="80" rx="8" fill="#451a03" stroke="#f97316" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="880" y="650" text-anchor="middle" fill="#fed7aa" font-family="Arial, sans-serif" font-size="12" font-weight="bold">📋 AttendanceService</text>
  <text x="880" y="670" text-anchor="middle" fill="#fb923c" font-family="Arial, sans-serif" font-size="10">⚠️ Sin Cache</text>
  <text x="880" y="688" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Datos transaccionales</text>
  
  <!-- AIService Python -->
  <rect x="1000" y="270" width="160" height="80" rx="8" fill="#3730a3" stroke="#818cf8" stroke-width="2"/>
  <text x="1080" y="300" text-anchor="middle" fill="#c7d2fe" font-family="Arial, sans-serif" font-size="12" font-weight="bold">🤖 AIService</text>
  <text x="1080" y="320" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">Python ✅</text>
  <text x="1080" y="338" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Ya implementado</text>
  
  <!-- Arrows Gateway to Redis -->
  <line x1="390" y1="280" x2="495" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="442" y="270" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">GET</text>
  
  <!-- Arrows Redis to Services -->
  <line x1="700" y1="250" x2="795" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="700" y1="280" x2="795" y2="260" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="700" y1="280" x2="795" y2="360" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="700" y1="320" x2="795" y2="460" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="700" y1="350" x2="795" y2="560" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- Arrow Redis to AIService -->
  <line x1="700" y1="280" x2="995" y2="310" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrows Services to PostgreSQL (Cache Miss) -->
  <line x1="800" y1="195" x2="700" y2="470" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="800" y1="295" x2="700" y2="490" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="800" y1="395" x2="700" y2="500" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  
  <!-- Arrow Attendance direct to DB -->
  <line x1="800" y1="660" x2="700" y2="540" stroke="#f97316" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="740" y="610" fill="#f97316" font-family="Arial, sans-serif" font-size="9">Directo</text>
  
  <!-- Flow Labels -->
  <rect x="20" y="700" width="1160" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="725" fill="#f8fafc" font-family="Arial, sans-serif" font-size="14" font-weight="bold">📊 Flujo de Cache:</text>
  <text x="40" y="750" fill="#22c55e" font-family="Arial, sans-serif" font-size="12">1. GET → Redis HIT → Return cached data (5ms)</text>
  <text x="400" y="750" fill="#ef4444" font-family="Arial, sans-serif" font-size="12">2. GET → Redis MISS → Query PostgreSQL → Cache result → Return (50ms)</text>
  <text x="40" y="770" fill="#6366f1" font-family="Arial, sans-serif" font-size="12">3. POST/PUT/DELETE → Update PostgreSQL → Invalidate cache keys → Return</text>
  
  <!-- TTL Summary Box -->
  <rect x="980" y="60" width="200" height="180" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1080" y="85" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" font-weight="bold">⏱️ TTL por Estabilidad</text>
  <line x1="1000" y1="95" x2="1160" y2="95" stroke="#334155" stroke-width="1"/>
  <text x="1000" y="115" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">24h - Campus, Venues</text>
  <text x="1000" y="135" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">12h - Programs, Categories</text>
  <text x="1000" y="155" fill="#86efac" font-family="Arial, sans-serif" font-size="10">6h - Groups, Templates</text>
  <text x="1000" y="175" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">1h - Schedules, Periods</text>
  <text x="1000" y="195" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="10">30min - Users, Search</text>
  <text x="1000" y="215" fill="#f97316" font-family="Arial, sans-serif" font-size="10">0 - Attendance (no cache)</text>
  <text x="1000" y="232" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">15min - AI Responses</text>
</svg>
