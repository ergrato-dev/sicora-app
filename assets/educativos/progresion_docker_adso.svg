<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none">
  <style>
    .title { font: bold 22px sans-serif; fill: #e0e0e0; }
    .subtitle { font: bold 14px sans-serif; fill: #90caf9; }
    .label { font: bold 12px sans-serif; fill: #ffffff; }
    .small-text { font: 11px sans-serif; fill: #b0bec5; }
    .code { font: bold 10px monospace; fill: #81c784; }
    .trimester { font: bold 16px sans-serif; fill: #ffb74d; }
    .percent { font: bold 11px sans-serif; fill: #ce93d8; }
  </style>
  
  <!-- Background -->
  <rect width="1100" height="700" fill="#1e1e1e"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" class="title">Progresión Docker en ADSO - Lista de Chequeo Moderna 2026</text>
  <text x="550" y="55" text-anchor="middle" class="small-text">De conceptos básicos a producción optimizada (T2 → T6)</text>
  
  <!-- Timeline Arrow -->
  <line x1="80" y1="100" x2="1020" y2="100" stroke="#546e7a" stroke-width="3"/>
  <polygon points="1020,95 1030,100 1020,105" fill="#546e7a"/>
  
  <!-- T2 -->
  <circle cx="150" cy="100" r="25" fill="#2196f3" stroke="#64b5f6" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" class="label">T2</text>
  
  <rect x="80" y="140" width="140" height="180" rx="8" fill="#263238" stroke="#2196f3" stroke-width="2"/>
  <text x="150" y="165" text-anchor="middle" class="trimester">Trimestre 2</text>
  <text x="150" y="185" text-anchor="middle" class="subtitle">DISCOVERY</text>
  <text x="150" y="205" text-anchor="middle" class="percent">Docker: 5%</text>
  
  <text x="90" y="230" class="code">✓ Qué es Docker</text>
  <text x="90" y="248" class="code">✓ Contenedores vs VMs</text>
  <text x="90" y="266" class="code">✓ Casos de uso</text>
  <text x="90" y="284" class="code">✓ Docker Hub</text>
  <text x="90" y="302" class="small-text">Conceptual, sin práctica</text>
  
  <!-- T3 -->
  <circle cx="320" cy="100" r="25" fill="#00bcd4" stroke="#4dd0e1" stroke-width="2"/>
  <text x="320" y="105" text-anchor="middle" class="label">T3</text>
  
  <rect x="250" y="140" width="140" height="180" rx="8" fill="#263238" stroke="#00bcd4" stroke-width="2"/>
  <text x="320" y="165" text-anchor="middle" class="trimester">Trimestre 3</text>
  <text x="320" y="185" text-anchor="middle" class="subtitle">DISEÑO</text>
  <text x="320" y="205" text-anchor="middle" class="percent">Docker: 10%</text>
  
  <text x="260" y="230" class="code">✓ Dockerfile básico</text>
  <text x="260" y="248" class="code">✓ FROM, COPY, RUN</text>
  <text x="260" y="266" class="code">✓ docker-compose.yml</text>
  <text x="260" y="284" class="code">✓ App + DB local</text>
  <text x="260" y="302" class="small-text">Primeros contenedores</text>
  
  <!-- T4 -->
  <circle cx="490" cy="100" r="25" fill="#4caf50" stroke="#81c784" stroke-width="2"/>
  <text x="490" y="105" text-anchor="middle" class="label">T4</text>
  
  <rect x="420" y="140" width="140" height="180" rx="8" fill="#263238" stroke="#4caf50" stroke-width="2"/>
  <text x="490" y="165" text-anchor="middle" class="trimester">Trimestre 4</text>
  <text x="490" y="185" text-anchor="middle" class="subtitle">MVP</text>
  <text x="490" y="205" text-anchor="middle" class="percent">Docker: 10%</text>
  
  <text x="430" y="230" class="code">✓ Ambiente completo</text>
  <text x="430" y="248" class="code">✓ Hot reload</text>
  <text x="430" y="266" class="code">✓ Volúmenes</text>
  <text x="430" y="284" class="code">✓ .dockerignore</text>
  <text x="430" y="302" class="small-text">Desarrollo productivo</text>
  
  <!-- T5 -->
  <circle cx="660" cy="100" r="25" fill="#ff9800" stroke="#ffb74d" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" class="label">T5</text>
  
  <rect x="590" y="140" width="140" height="180" rx="8" fill="#263238" stroke="#ff9800" stroke-width="2"/>
  <text x="660" y="165" text-anchor="middle" class="trimester">Trimestre 5</text>
  <text x="660" y="185" text-anchor="middle" class="subtitle">FEATURES</text>
  <text x="660" y="205" text-anchor="middle" class="percent">Docker: 15%</text>
  
  <text x="600" y="230" class="code">✓ Multi-stage build</text>
  <text x="600" y="248" class="code">✓ Imagen <100MB</text>
  <text x="600" y="266" class="code">✓ Tests en Docker</text>
  <text x="600" y="284" class="code">✓ CI consistency</text>
  <text x="600" y="302" class="small-text">Optimización</text>
  
  <!-- T6 -->
  <circle cx="830" cy="100" r="25" fill="#f44336" stroke="#ef5350" stroke-width="2"/>
  <text x="830" y="105" text-anchor="middle" class="label">T6</text>
  
  <rect x="760" y="140" width="140" height="180" rx="8" fill="#263238" stroke="#f44336" stroke-width="2"/>
  <text x="830" y="165" text-anchor="middle" class="trimester">Trimestre 6</text>
  <text x="830" y="185" text-anchor="middle" class="subtitle">DEPLOY</text>
  <text x="830" y="205" text-anchor="middle" class="percent">Docker: 20%</text>
  
  <text x="770" y="230" class="code">✓ Non-root user</text>
  <text x="770" y="248" class="code">✓ HEALTHCHECK</text>
  <text x="770" y="266" class="code">✓ compose.prod.yml</text>
  <text x="770" y="284" class="code">✓ Limits + restart</text>
  <text x="770" y="302" class="small-text">Producción</text>
  
  <!-- T7 -->
  <circle cx="1000" cy="100" r="25" fill="#9c27b0" stroke="#ba68c8" stroke-width="2"/>
  <text x="1000" y="105" text-anchor="middle" class="label">T7</text>
  
  <rect x="930" y="140" width="140" height="120" rx="8" fill="#263238" stroke="#9c27b0" stroke-width="2"/>
  <text x="1000" y="165" text-anchor="middle" class="trimester">Trimestre 7</text>
  <text x="1000" y="185" text-anchor="middle" class="subtitle">POLISH</text>
  <text x="1000" y="205" text-anchor="middle" class="percent">Integrado</text>
  
  <text x="940" y="230" class="small-text">Docker ya dominado</text>
  <text x="940" y="248" class="small-text">Foco en UX/Seguridad</text>
  
  <!-- Skills Progression Bar -->
  <rect x="80" y="350" width="940" height="60" rx="10" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <text x="550" y="375" text-anchor="middle" class="label">PROGRESIÓN DE HABILIDADES DOCKER</text>
  
  <rect x="90" y="385" width="150" height="15" rx="4" fill="#2196f3"/>
  <text x="165" y="396" text-anchor="middle" class="small-text">Conceptos</text>
  
  <rect x="245" y="385" width="150" height="15" rx="4" fill="#00bcd4"/>
  <text x="320" y="396" text-anchor="middle" class="small-text">Dockerfile</text>
  
  <rect x="400" y="385" width="150" height="15" rx="4" fill="#4caf50"/>
  <text x="475" y="396" text-anchor="middle" class="small-text">Compose Dev</text>
  
  <rect x="555" y="385" width="150" height="15" rx="4" fill="#ff9800"/>
  <text x="630" y="396" text-anchor="middle" class="small-text">Multi-stage</text>
  
  <rect x="710" y="385" width="150" height="15" rx="4" fill="#f44336"/>
  <text x="785" y="396" text-anchor="middle" class="small-text">Producción</text>
  
  <rect x="865" y="385" width="150" height="15" rx="4" fill="#9c27b0"/>
  <text x="940" y="396" text-anchor="middle" class="small-text">Orquestación</text>
  
  <!-- Key Commands Section -->
  <rect x="80" y="430" width="450" height="220" rx="8" fill="#1a237e" stroke="#3949ab" stroke-width="2"/>
  <text x="305" y="455" text-anchor="middle" class="subtitle">Comandos Clave por Trimestre</text>
  
  <text x="95" y="480" class="code">T2: docker --version</text>
  <text x="95" y="498" class="code">T3: docker build -t app .</text>
  <text x="95" y="516" class="code">    docker-compose up -d</text>
  <text x="95" y="534" class="code">T4: docker-compose -f compose.dev.yml up</text>
  <text x="95" y="552" class="code">    docker volume ls</text>
  <text x="95" y="570" class="code">T5: docker build --target prod .</text>
  <text x="95" y="588" class="code">    docker-compose run tests</text>
  <text x="95" y="606" class="code">T6: docker inspect --format '...'</text>
  <text x="95" y="624" class="code">    docker stats</text>
  
  <!-- Best Practices Section -->
  <rect x="550" y="430" width="470" height="220" rx="8" fill="#1b5e20" stroke="#43a047" stroke-width="2"/>
  <text x="785" y="455" text-anchor="middle" class="subtitle">Buenas Prácticas</text>
  
  <text x="565" y="480" class="small-text">✓ Usar .dockerignore (node_modules, .git, .env)</text>
  <text x="565" y="500" class="small-text">✓ Multi-stage builds para imágenes pequeñas</text>
  <text x="565" y="520" class="small-text">✓ Non-root user por seguridad</text>
  <text x="565" y="540" class="small-text">✓ HEALTHCHECK para orchestration</text>
  <text x="565" y="560" class="small-text">✓ Separar compose dev/test/prod</text>
  <text x="565" y="580" class="small-text">✓ Variables de entorno, NO secretos hardcoded</text>
  <text x="565" y="600" class="small-text">✓ restart: unless-stopped en producción</text>
  <text x="565" y="620" class="small-text">✓ mem_limit para evitar OOM</text>
  
  <!-- Footer -->
  <text x="550" y="670" text-anchor="middle" class="small-text">Lista de Chequeo MODERNA ADSO 2026 - Docker desde T2 (conceptual) hasta T6 (producción)</text>
  <text x="550" y="688" text-anchor="middle" class="code">projectevalservice | SICORA - Sistema de Control de Horarios Académicos</text>
</svg>
