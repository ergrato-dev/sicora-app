<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" fill="none">
  <style>
    .title { font: bold 18px sans-serif; fill: #e2e8f0; }
    .subtitle { font: 14px sans-serif; fill: #94a3b8; }
    .label { font: 12px sans-serif; fill: #cbd5e1; }
    .label-sm { font: 10px sans-serif; fill: #94a3b8; }
    .code { font: 11px monospace; fill: #a5f3fc; }
    .highlight { fill: #60a5fa; }
    .success { fill: #4ade80; }
    .warning { fill: #fbbf24; }
    .box { stroke: #475569; stroke-width: 1.5; fill: #1e293b; rx: 8; }
    .box-accent { stroke: #3b82f6; stroke-width: 2; fill: #1e3a5f; rx: 8; }
    .box-store { stroke: #8b5cf6; stroke-width: 2; fill: #2e1065; rx: 8; }
    .box-hook { stroke: #22c55e; stroke-width: 2; fill: #14532d; rx: 8; }
    .box-ui { stroke: #f59e0b; stroke-width: 2; fill: #451a03; rx: 8; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-data { stroke: #60a5fa; stroke-width: 2; fill: none; marker-end: url(#arrowhead-blue); }
    .line-dashed { stroke: #475569; stroke-width: 1; stroke-dasharray: 4,4; }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="650" fill="#0f172a"/>
  
  <!-- Header -->
  <text x="450" y="35" text-anchor="middle" class="title">Sistema de Branding Configurable - Arquitectura</text>
  <text x="450" y="55" text-anchor="middle" class="subtitle">Flujo de datos: Types → Store → Hooks → Componentes</text>

  <!-- Section: Types -->
  <rect x="20" y="80" width="200" height="200" class="box-accent"/>
  <text x="120" y="105" text-anchor="middle" class="label" fill="#60a5fa">TYPES</text>
  <text x="35" y="130" class="code">BrandingConfig</text>
  <text x="45" y="150" class="label-sm">├─ name, subtitle</text>
  <text x="45" y="168" class="label-sm">├─ logo: LogoConfig</text>
  <text x="45" y="186" class="label-sm">├─ theme: ThemeConfig</text>
  <text x="45" y="204" class="label-sm">├─ texts: TextsConfig</text>
  <text x="45" y="222" class="label-sm">└─ seo: SEOConfig</text>
  <text x="35" y="250" class="code">ThemeColors</text>
  <text x="35" y="270" class="code">COLOR_PRESETS[]</text>

  <!-- Section: Store -->
  <rect x="250" y="80" width="200" height="200" class="box-store"/>
  <text x="350" y="105" text-anchor="middle" class="label" fill="#a78bfa">ZUSTAND STORE</text>
  <text x="265" y="130" class="code">useBrandingStore</text>
  <text x="275" y="150" class="label-sm">├─ config: BrandingConfig</text>
  <text x="275" y="168" class="label-sm">├─ previewConfig</text>
  <text x="275" y="186" class="label-sm">├─ previewMode</text>
  <text x="275" y="204" class="label-sm">├─ isLoading, error</text>
  <line x1="265" y1="220" x2="430" y2="220" class="line-dashed"/>
  <text x="275" y="240" class="label-sm">fetchBranding()</text>
  <text x="275" y="258" class="label-sm">updateBranding()</text>
  <text x="275" y="276" class="label-sm">applyThemeToDocument()</text>

  <!-- Section: Hooks -->
  <rect x="480" y="80" width="200" height="200" class="box-hook"/>
  <text x="580" y="105" text-anchor="middle" class="label" fill="#4ade80">HOOKS</text>
  <text x="495" y="130" class="code">useBranding()</text>
  <text x="495" y="155" class="code">useBrandingContext()</text>
  <text x="495" y="180" class="code">useBrandName()</text>
  <text x="495" y="205" class="code">useBrandLogo()</text>
  <text x="495" y="230" class="code">useBrandColors()</text>
  <text x="495" y="255" class="code">useBrandTexts()</text>

  <!-- Section: Components -->
  <rect x="710" y="80" width="170" height="200" class="box-ui"/>
  <text x="795" y="105" text-anchor="middle" class="label" fill="#fbbf24">COMPONENTES</text>
  <text x="725" y="135" class="label-sm">InstitutionalHeader</text>
  <text x="725" y="155" class="label-sm">InstitutionalFooter</text>
  <text x="725" y="175" class="label-sm">LoginPage</text>
  <text x="725" y="195" class="label-sm">Dashboard</text>
  <text x="725" y="215" class="label-sm">BrandingAdminPage</text>
  <line x1="725" y1="230" x2="865" y2="230" class="line-dashed"/>
  <text x="725" y="250" class="label-sm">Renderiza con config</text>
  <text x="725" y="270" class="label-sm">dinámica</text>

  <!-- Arrows between sections -->
  <path d="M 220 180 L 248 180" class="arrow-data"/>
  <path d="M 450 180 L 478 180" class="arrow-data"/>
  <path d="M 680 180 L 708 180" class="arrow-data"/>

  <!-- Storage Layer -->
  <rect x="20" y="310" width="430" height="130" class="box"/>
  <text x="235" y="335" text-anchor="middle" class="label">CAPA DE PERSISTENCIA</text>
  
  <!-- localStorage box -->
  <rect x="40" y="355" width="150" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="115" y="380" text-anchor="middle" class="code">localStorage</text>
  <text x="115" y="400" text-anchor="middle" class="label-sm">'sicora-branding'</text>
  <text x="115" y="418" text-anchor="middle" class="label-sm" fill="#4ade80">✓ Activo</text>
  
  <!-- API box -->
  <rect x="210" y="355" width="220" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="320" y="380" text-anchor="middle" class="code">API Backend</text>
  <text x="320" y="400" text-anchor="middle" class="label-sm">/api/branding</text>
  <text x="320" y="418" text-anchor="middle" class="label-sm" fill="#fbbf24">○ Preparado</text>

  <!-- Connect Store to Storage -->
  <path d="M 350 280 L 350 308" class="arrow"/>
  <path d="M 115 355 L 115 310 L 280 310" class="arrow" style="marker-end: none;"/>

  <!-- Theme Application -->
  <rect x="480" y="310" width="400" height="130" class="box"/>
  <text x="680" y="335" text-anchor="middle" class="label">APLICACIÓN DE TEMA</text>
  
  <!-- CSS Variables -->
  <rect x="500" y="355" width="170" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="585" y="378" text-anchor="middle" class="code">CSS Variables</text>
  <text x="585" y="398" text-anchor="middle" class="label-sm">--color-primary</text>
  <text x="585" y="413" text-anchor="middle" class="label-sm">--color-secondary</text>
  
  <!-- Document -->
  <rect x="690" y="355" width="170" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="775" y="378" text-anchor="middle" class="code">document</text>
  <text x="775" y="398" text-anchor="middle" class="label-sm">title, favicon</text>
  <text x="775" y="413" text-anchor="middle" class="label-sm">:root styles</text>

  <!-- Connect Store to Theme -->
  <path d="M 400 280 L 400 295 L 585 295 L 585 353" class="arrow"/>

  <!-- Color Presets Section -->
  <rect x="20" y="470" width="430" height="160" class="box"/>
  <text x="235" y="495" text-anchor="middle" class="label">PALETAS DE COLORES PREDEFINIDAS</text>
  
  <!-- Color swatches -->
  <g transform="translate(40, 515)">
    <!-- Blue -->
    <rect x="0" y="0" width="60" height="40" rx="4" fill="#2563eb"/>
    <rect x="0" y="45" width="60" height="15" rx="2" fill="#3b82f6"/>
    <text x="30" y="75" text-anchor="middle" class="label-sm">Azul</text>
    
    <!-- Green -->
    <rect x="75" y="0" width="60" height="40" rx="4" fill="#16a34a"/>
    <rect x="75" y="45" width="60" height="15" rx="2" fill="#22c55e"/>
    <text x="105" y="75" text-anchor="middle" class="label-sm">Verde</text>
    
    <!-- Purple -->
    <rect x="150" y="0" width="60" height="40" rx="4" fill="#9333ea"/>
    <rect x="150" y="45" width="60" height="15" rx="2" fill="#a855f7"/>
    <text x="180" y="75" text-anchor="middle" class="label-sm">Púrpura</text>
    
    <!-- Orange -->
    <rect x="225" y="0" width="60" height="40" rx="4" fill="#ea580c"/>
    <rect x="225" y="45" width="60" height="15" rx="2" fill="#f97316"/>
    <text x="255" y="75" text-anchor="middle" class="label-sm">Naranja</text>
    
    <!-- Teal -->
    <rect x="300" y="0" width="60" height="40" rx="4" fill="#0d9488"/>
    <rect x="300" y="45" width="60" height="15" rx="2" fill="#14b8a6"/>
    <text x="330" y="75" text-anchor="middle" class="label-sm">Teal</text>
    
    <!-- Rose -->
    <rect x="375" y="0" width="60" height="40" rx="4" fill="#db2777"/>
    <rect x="375" y="45" width="60" height="15" rx="2" fill="#ec4899"/>
    <text x="405" y="75" text-anchor="middle" class="label-sm">Rosa</text>
  </g>
  
  <text x="235" y="615" text-anchor="middle" class="label-sm">applyColorPreset(presetId) → Aplica tema completo</text>

  <!-- Admin Panel Section -->
  <rect x="480" y="470" width="400" height="160" class="box"/>
  <text x="680" y="495" text-anchor="middle" class="label">PANEL DE ADMINISTRACIÓN</text>
  <text x="680" y="515" text-anchor="middle" class="label-sm">/admin/branding</text>
  
  <!-- Tabs representation -->
  <g transform="translate(510, 535)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="#3b82f6"/>
    <text x="40" y="20" text-anchor="middle" class="label-sm" fill="white">Identidad</text>
    
    <rect x="90" y="0" width="60" height="30" rx="4" fill="#1e293b" stroke="#475569"/>
    <text x="120" y="20" text-anchor="middle" class="label-sm">Logo</text>
    
    <rect x="160" y="0" width="65" height="30" rx="4" fill="#1e293b" stroke="#475569"/>
    <text x="192" y="20" text-anchor="middle" class="label-sm">Colores</text>
    
    <rect x="235" y="0" width="60" height="30" rx="4" fill="#1e293b" stroke="#475569"/>
    <text x="265" y="20" text-anchor="middle" class="label-sm">Textos</text>
  </g>
  
  <!-- Preview mode indicator -->
  <rect x="510" y="580" width="350" height="35" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <circle cx="530" cy="598" r="6" fill="#60a5fa"/>
  <text x="545" y="603" class="label-sm" fill="#60a5fa">Modo Preview: Vista previa sin guardar cambios</text>

</svg>
