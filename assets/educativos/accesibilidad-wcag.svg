<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 28px 'Segoe UI', sans-serif; fill: #f1f5f9; }
      .subtitle { font: 16px 'Segoe UI', sans-serif; fill: #94a3b8; }
      .header { font: bold 18px 'Segoe UI', sans-serif; fill: #f1f5f9; }
      .text { font: 14px 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .small { font: 12px 'Segoe UI', sans-serif; fill: #94a3b8; }
      .label { font: bold 12px 'Segoe UI', sans-serif; fill: #1e293b; }
      .highlight { font: bold 14px 'Segoe UI', sans-serif; fill: #38bdf8; }
      .check { font: 14px 'Segoe UI', sans-serif; fill: #4ade80; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#0f172a"/>
  
  <!-- Title Section -->
  <text x="500" y="40" text-anchor="middle" class="title">Accesibilidad Web - WCAG 2.1/2.2</text>
  <text x="500" y="65" text-anchor="middle" class="subtitle">Principios POUR y Estándares Internacionales</text>
  
  <!-- POUR Principles - 4 Columns -->
  
  <!-- P - Perceptible -->
  <g transform="translate(30, 100)">
    <rect width="230" height="250" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect width="230" height="45" rx="8" fill="#3b82f6"/>
    <text x="115" y="30" text-anchor="middle" class="header">P - PERCEPTIBLE</text>
    
    <text x="15" y="70" class="text">✓ Alt text en imágenes</text>
    <text x="15" y="95" class="text">✓ Contraste 4.5:1 mínimo</text>
    <text x="15" y="120" class="text">✓ No solo color para info</text>
    <text x="15" y="145" class="text">✓ Estructura semántica</text>
    <text x="15" y="170" class="text">✓ Contenido legible</text>
    <text x="15" y="195" class="text">✓ Texto redimensionable</text>
    
    <text x="15" y="230" class="small">Criterios: 1.1.1, 1.3.1, 1.4.x</text>
  </g>
  
  <!-- O - Operable -->
  <g transform="translate(275, 100)">
    <rect width="230" height="250" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect width="230" height="45" rx="8" fill="#22c55e"/>
    <text x="115" y="30" text-anchor="middle" class="header">O - OPERABLE</text>
    
    <text x="15" y="70" class="text">✓ Navegable por teclado</text>
    <text x="15" y="95" class="text">✓ Foco visible siempre</text>
    <text x="15" y="120" class="text">✓ Sin trampas de teclado</text>
    <text x="15" y="145" class="text">✓ Skip links</text>
    <text x="15" y="170" class="text">✓ Tiempo suficiente</text>
    <text x="15" y="195" class="text">✓ Orden lógico del foco</text>
    
    <text x="15" y="230" class="small">Criterios: 2.1.x, 2.4.x</text>
  </g>
  
  <!-- U - Comprensible -->
  <g transform="translate(520, 100)">
    <rect width="230" height="250" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <rect width="230" height="45" rx="8" fill="#eab308"/>
    <text x="115" y="30" text-anchor="middle" class="label" style="font-size: 18px">U - COMPRENSIBLE</text>
    
    <text x="15" y="70" class="text">✓ Idioma definido (lang)</text>
    <text x="15" y="95" class="text">✓ Labels descriptivos</text>
    <text x="15" y="120" class="text">✓ Errores identificados</text>
    <text x="15" y="145" class="text">✓ Sugerencias de corrección</text>
    <text x="15" y="170" class="text">✓ Comportamiento predecible</text>
    <text x="15" y="195" class="text">✓ Ayuda disponible</text>
    
    <text x="15" y="230" class="small">Criterios: 3.1.x, 3.2.x, 3.3.x</text>
  </g>
  
  <!-- R - Robusto -->
  <g transform="translate(765, 100)">
    <rect width="230" height="250" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <rect width="230" height="45" rx="8" fill="#a855f7"/>
    <text x="115" y="30" text-anchor="middle" class="header">R - ROBUSTO</text>
    
    <text x="15" y="70" class="text">✓ HTML válido</text>
    <text x="15" y="95" class="text">✓ ARIA correcto</text>
    <text x="15" y="120" class="text">✓ Nombre, rol, valor</text>
    <text x="15" y="145" class="text">✓ Live regions</text>
    <text x="15" y="170" class="text">✓ Compatible con AT</text>
    <text x="15" y="195" class="text">✓ Mensajes de estado</text>
    
    <text x="15" y="230" class="small">Criterios: 4.1.x</text>
  </g>
  
  <!-- Standards Section -->
  <g transform="translate(30, 380)">
    <rect width="460" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="230" y="30" text-anchor="middle" class="header">Estándares Internacionales</text>
    
    <g transform="translate(20, 50)">
      <rect width="200" height="35" rx="4" fill="#2563eb"/>
      <text x="100" y="23" text-anchor="middle" class="text">WCAG 2.1/2.2</text>
    </g>
    
    <g transform="translate(240, 50)">
      <rect width="200" height="35" rx="4" fill="#059669"/>
      <text x="100" y="23" text-anchor="middle" class="text">WAI-ARIA 1.2</text>
    </g>
    
    <g transform="translate(20, 95)">
      <rect width="200" height="35" rx="4" fill="#7c3aed"/>
      <text x="100" y="23" text-anchor="middle" class="text">Section 508 (USA)</text>
    </g>
    
    <g transform="translate(240, 95)">
      <rect width="200" height="35" rx="4" fill="#dc2626"/>
      <text x="100" y="23" text-anchor="middle" class="text">EN 301 549 (EU)</text>
    </g>
  </g>
  
  <!-- Button UX Pattern -->
  <g transform="translate(510, 380)">
    <rect width="480" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="240" y="30" text-anchor="middle" class="header">Patrón UX: Botones de Acción</text>
    
    <!-- Modal Footer Example -->
    <rect x="30" y="55" width="420" height="70" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="45" y="80" class="small">Footer del Modal</text>
    
    <!-- Secondary Button (outline) -->
    <rect x="180" y="90" width="100" height="28" rx="4" fill="none" stroke="#64748b" stroke-width="1"/>
    <text x="230" y="109" text-anchor="middle" class="small">Cancelar</text>
    
    <!-- Primary Button (filled) -->
    <rect x="295" y="90" width="140" height="28" rx="4" fill="#2563eb"/>
    <text x="365" y="109" text-anchor="middle" class="text">Guardar</text>
    
    <!-- Labels -->
    <text x="230" y="75" text-anchor="middle" class="small" style="fill: #94a3b8">Secundario</text>
    <text x="365" y="75" text-anchor="middle" class="small" style="fill: #38bdf8">Primario →</text>
  </g>
  
  <!-- Keyboard Navigation -->
  <g transform="translate(30, 545)">
    <rect width="320" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="160" y="30" text-anchor="middle" class="header">Navegación por Teclado</text>
    
    <g transform="translate(20, 50)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">Tab</text>
      <text x="70" y="17" class="small">→ Siguiente elemento</text>
    </g>
    
    <g transform="translate(20, 80)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">Esc</text>
      <text x="70" y="17" class="small">→ Cerrar modal</text>
    </g>
    
    <g transform="translate(20, 110)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">Enter</text>
      <text x="70" y="17" class="small">→ Activar botón</text>
    </g>
    
    <g transform="translate(165, 50)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">↑↓←→</text>
      <text x="70" y="17" class="small">→ Navegar menús</text>
    </g>
    
    <g transform="translate(165, 80)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">Home</text>
      <text x="70" y="17" class="small">→ Primer item</text>
    </g>
    
    <g transform="translate(165, 110)">
      <rect width="50" height="25" rx="3" fill="#334155"/>
      <text x="25" y="17" text-anchor="middle" class="small">End</text>
      <text x="70" y="17" class="small">→ Último item</text>
    </g>
  </g>
  
  <!-- WCAG Levels -->
  <g transform="translate(370, 545)">
    <rect width="280" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="140" y="30" text-anchor="middle" class="header">Niveles WCAG</text>
    
    <g transform="translate(20, 50)">
      <rect width="80" height="25" rx="3" fill="#22c55e"/>
      <text x="40" y="17" text-anchor="middle" class="label">Nivel A</text>
      <text x="100" y="17" class="small">Mínimo básico</text>
    </g>
    
    <g transform="translate(20, 85)">
      <rect width="80" height="25" rx="3" fill="#3b82f6"/>
      <text x="40" y="17" text-anchor="middle" class="label">Nivel AA</text>
      <text x="100" y="17" class="highlight">← Objetivo SICORA</text>
    </g>
    
    <g transform="translate(20, 120)">
      <rect width="80" height="25" rx="3" fill="#a855f7"/>
      <text x="40" y="17" text-anchor="middle" class="label">Nivel AAA</text>
      <text x="100" y="17" class="small">Máxima accesibilidad</text>
    </g>
  </g>
  
  <!-- Contrast Example -->
  <g transform="translate(670, 545)">
    <rect width="320" height="140" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="160" y="30" text-anchor="middle" class="header">Contraste Mínimo</text>
    
    <g transform="translate(20, 50)">
      <rect width="130" height="40" rx="4" fill="#ffffff"/>
      <text x="65" y="28" text-anchor="middle" style="font: 14px sans-serif; fill: #0f172a">Texto Normal</text>
      <text x="155" y="25" class="highlight">4.5:1</text>
    </g>
    
    <g transform="translate(20, 100)">
      <rect width="130" height="40" rx="4" fill="#ffffff"/>
      <text x="65" y="28" text-anchor="middle" style="font: bold 18px sans-serif; fill: #64748b">Grande</text>
      <text x="155" y="25" class="highlight">3:1</text>
    </g>
    
    <g transform="translate(200, 50)">
      <circle cx="30" cy="20" r="18" fill="#2563eb"/>
      <text x="65" y="25" class="small">UI: 3:1</text>
    </g>
    
    <g transform="translate(200, 90)">
      <rect x="5" y="5" width="50" height="30" rx="4" fill="none" stroke="#64748b" stroke-width="2"/>
      <text x="75" y="25" class="small">Bordes: 3:1</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="500" y="695" text-anchor="middle" class="small">SICORA - Nivel Objetivo: WCAG 2.1 AA | WAI-ARIA 1.2 | Section 508 | EN 301 549</text>
</svg>
