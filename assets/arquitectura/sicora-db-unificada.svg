<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" style="background-color: #1e1e1e;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#569cd6"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" fill="#ffffff" font-family="Segoe UI, Arial" font-size="24" font-weight="bold" text-anchor="middle">
    SICORA - Arquitectura de Base de Datos Unificada
  </text>
  <text x="450" y="55" fill="#808080" font-family="Segoe UI, Arial" font-size="12" text-anchor="middle">
    Una Base de Datos • Múltiples Esquemas • Go + Python
  </text>
  
  <!-- PostgreSQL Container -->
  <rect x="100" y="80" width="700" height="580" rx="15" fill="#252526" stroke="#3c9dd0" stroke-width="3"/>
  <text x="450" y="110" fill="#3c9dd0" font-family="Segoe UI, Arial" font-size="18" font-weight="bold" text-anchor="middle">
    PostgreSQL 18 (Puerto 5433)
  </text>
  
  <!-- Database sicora_dev -->
  <rect x="130" y="130" width="640" height="510" rx="10" fill="#1e1e1e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="450" y="160" fill="#4ec9b0" font-family="Segoe UI, Arial" font-size="16" font-weight="bold" text-anchor="middle">
    Base de Datos: sicora_dev
  </text>
  <text x="450" y="180" fill="#808080" font-family="Segoe UI, Arial" font-size="11" text-anchor="middle">
    Usuario: sicora_user | Contraseña: sicora_password
  </text>
  
  <!-- Go Services Row -->
  <text x="170" y="220" fill="#ce9178" font-family="Segoe UI, Arial" font-size="14" font-weight="bold">
    Servicios Go
  </text>
  
  <!-- UserService Schema -->
  <rect x="150" y="235" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="220" y="260" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">userservice</text>
  <text x="220" y="280" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8001</text>
  <text x="220" y="300" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">users, roles, auth</text>
  
  <!-- ScheduleService Schema -->
  <rect x="310" y="235" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="380" y="260" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">scheduleservice</text>
  <text x="380" y="280" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8002</text>
  <text x="380" y="300" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">schedules, classes</text>
  
  <!-- AttendanceService Schema -->
  <rect x="470" y="235" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="540" y="260" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">attendanceservice</text>
  <text x="540" y="280" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8003</text>
  <text x="540" y="300" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">attendance, records</text>
  
  <!-- EvalinService Schema -->
  <rect x="630" y="235" width="120" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="690" y="260" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">evalinservice</text>
  <text x="690" y="280" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8004</text>
  <text x="690" y="300" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">evaluations</text>
  
  <!-- Second Row Go -->
  <rect x="150" y="330" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="220" y="355" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">kbservice</text>
  <text x="220" y="375" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8005</text>
  <text x="220" y="395" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">knowledge base</text>
  
  <rect x="310" y="330" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="380" y="355" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">mevalservice</text>
  <text x="380" y="375" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8006</text>
  <text x="380" y="395" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">method eval</text>
  
  <rect x="470" y="330" width="140" height="80" rx="5" fill="#264f78" stroke="#569cd6" stroke-width="1"/>
  <text x="540" y="355" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">projectevalservice</text>
  <text x="540" y="375" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8008</text>
  <text x="540" y="395" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">project eval</text>
  
  <!-- Python Services Row -->
  <text x="170" y="445" fill="#4ec9b0" font-family="Segoe UI, Arial" font-size="14" font-weight="bold">
    Servicios Python
  </text>
  
  <rect x="150" y="460" width="140" height="80" rx="5" fill="#3e3d32" stroke="#4ec9b0" stroke-width="1"/>
  <text x="220" y="485" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">aiservice</text>
  <text x="220" y="505" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8007</text>
  <text x="220" y="525" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">AI/ML, embeddings</text>
  
  <!-- API Gateway -->
  <rect x="310" y="460" width="250" height="80" rx="5" fill="#4a2545" stroke="#c586c0" stroke-width="2"/>
  <text x="435" y="485" fill="#ffffff" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" text-anchor="middle">apigateway (Go)</text>
  <text x="435" y="505" fill="#9cdcfe" font-family="Consolas, monospace" font-size="10" text-anchor="middle">Puerto: 8000</text>
  <text x="435" y="525" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">routing, auth, rate limiting</text>
  
  <!-- Shared Components -->
  <text x="170" y="570" fill="#dcdcaa" font-family="Segoe UI, Arial" font-size="14" font-weight="bold">
    Componentes Compartidos
  </text>
  
  <rect x="150" y="585" width="200" height="45" rx="5" fill="#2d2d2d" stroke="#dcdcaa" stroke-width="1"/>
  <text x="250" y="610" fill="#dcdcaa" font-family="Segoe UI, Arial" font-size="11" text-anchor="middle">public schema</text>
  <text x="250" y="625" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">shared tables, enums</text>
  
  <rect x="370" y="585" width="180" height="45" rx="5" fill="#2d2d2d" stroke="#f48771" stroke-width="1"/>
  <text x="460" y="610" fill="#f48771" font-family="Segoe UI, Arial" font-size="11" text-anchor="middle">Extensions</text>
  <text x="460" y="625" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">uuid-ossp, pg_trgm, vector</text>
  
  <rect x="570" y="585" width="180" height="45" rx="5" fill="#2d2d2d" stroke="#ce9178" stroke-width="1"/>
  <text x="660" y="610" fill="#ce9178" font-family="Segoe UI, Arial" font-size="11" text-anchor="middle">JWT Unificado</text>
  <text x="660" y="625" fill="#6a9955" font-family="Consolas, monospace" font-size="9" text-anchor="middle">sicora-dev-secret-key...</text>
  
  <!-- Legend -->
  <rect x="810" y="100" width="80" height="120" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="850" y="120" fill="#ffffff" font-family="Segoe UI, Arial" font-size="10" font-weight="bold" text-anchor="middle">Leyenda</text>
  
  <rect x="820" y="130" width="15" height="10" fill="#264f78" stroke="#569cd6"/>
  <text x="840" y="138" fill="#808080" font-family="Segoe UI, Arial" font-size="8">Go</text>
  
  <rect x="820" y="150" width="15" height="10" fill="#3e3d32" stroke="#4ec9b0"/>
  <text x="840" y="158" fill="#808080" font-family="Segoe UI, Arial" font-size="8">Python</text>
  
  <rect x="820" y="170" width="15" height="10" fill="#4a2545" stroke="#c586c0"/>
  <text x="840" y="178" fill="#808080" font-family="Segoe UI, Arial" font-size="8">Gateway</text>
  
  <rect x="820" y="190" width="15" height="10" fill="#2d2d2d" stroke="#dcdcaa"/>
  <text x="840" y="198" fill="#808080" font-family="Segoe UI, Arial" font-size="8">Shared</text>
</svg>
