<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .box { fill: #16213e; stroke: #0f3460; stroke-width: 2; rx: 8; }
      .box-sonar { fill: #4e9bcd; stroke: #3a7ba8; stroke-width: 2; rx: 8; }
      .box-go { fill: #00add8; stroke: #007d9c; stroke-width: 2; rx: 8; }
      .box-python { fill: #3776ab; stroke: #2b5a85; stroke-width: 2; rx: 8; }
      .box-ts { fill: #3178c6; stroke: #265a9e; stroke-width: 2; rx: 8; }
      .box-db { fill: #336791; stroke: #264f6d; stroke-width: 2; rx: 8; }
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #4e9bcd; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #a0a0a0; }
      .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
      .label-sm { font-family: Arial, sans-serif; font-size: 10px; fill: #ffffff; }
      .arrow { stroke: #718096; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-scan { stroke: #4e9bcd; stroke-width: 2; stroke-dasharray: 5,3; fill: none; marker-end: url(#arrowhead-blue); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4e9bcd"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SICORA - SonarQube Analysis Pipeline</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Analisis de calidad de codigo multilenguaje</text>
  
  <!-- Source Code Modules -->
  <text x="130" y="85" text-anchor="middle" class="label" fill="#a0a0a0">Source Code</text>
  
  <!-- Go Backend -->
  <rect x="30" y="100" width="200" height="80" class="box-go"/>
  <text x="130" y="130" text-anchor="middle" class="label">sicora-be-go</text>
  <text x="130" y="150" text-anchor="middle" class="label-sm">Go 1.25 | 8 servicios</text>
  <text x="130" y="165" text-anchor="middle" class="label-sm">coverage.out</text>
  
  <!-- Python Backend -->
  <rect x="30" y="200" width="200" height="80" class="box-python"/>
  <text x="130" y="230" text-anchor="middle" class="label">sicora-be-python</text>
  <text x="130" y="250" text-anchor="middle" class="label-sm">Python 3.14 | 9 servicios</text>
  <text x="130" y="265" text-anchor="middle" class="label-sm">coverage.xml</text>
  
  <!-- Frontend -->
  <rect x="30" y="300" width="200" height="80" class="box-ts"/>
  <text x="130" y="330" text-anchor="middle" class="label">sicora-app-fe</text>
  <text x="130" y="350" text-anchor="middle" class="label-sm">TypeScript | React + Vite</text>
  <text x="130" y="365" text-anchor="middle" class="label-sm">lcov.info</text>
  
  <!-- sonar-scanner -->
  <rect x="280" y="180" width="140" height="100" class="box"/>
  <text x="350" y="215" text-anchor="middle" class="label">sonar-scanner</text>
  <text x="350" y="235" text-anchor="middle" class="label-sm">CLI Tool</text>
  <text x="350" y="255" text-anchor="middle" class="label-sm">sonar-project</text>
  <text x="350" y="270" text-anchor="middle" class="label-sm">.properties</text>
  
  <!-- Arrows to scanner -->
  <line x1="230" y1="140" x2="275" y2="200" class="arrow-scan"/>
  <line x1="230" y1="240" x2="275" y2="230" class="arrow-scan"/>
  <line x1="230" y1="340" x2="275" y2="260" class="arrow-scan"/>
  
  <!-- SonarQube Server -->
  <rect x="480" y="120" width="280" height="220" class="box-sonar"/>
  <text x="620" y="150" text-anchor="middle" class="label">SonarQube Server</text>
  <text x="620" y="170" text-anchor="middle" class="label-sm">localhost:9000</text>
  
  <!-- Features inside SonarQube -->
  <rect x="500" y="185" width="110" height="60" class="box" opacity="0.7"/>
  <text x="555" y="210" text-anchor="middle" class="label-sm">Code Smells</text>
  <text x="555" y="225" text-anchor="middle" class="label-sm">Bugs</text>
  <text x="555" y="240" text-anchor="middle" class="label-sm">Vulnerabilities</text>
  
  <rect x="630" y="185" width="110" height="60" class="box" opacity="0.7"/>
  <text x="685" y="210" text-anchor="middle" class="label-sm">Coverage</text>
  <text x="685" y="225" text-anchor="middle" class="label-sm">Duplications</text>
  <text x="685" y="240" text-anchor="middle" class="label-sm">Tech Debt</text>
  
  <!-- Quality Gate -->
  <rect x="540" y="260" width="160" height="50" class="box" opacity="0.7"/>
  <text x="620" y="285" text-anchor="middle" class="label-sm">Quality Gate</text>
  <text x="620" y="300" text-anchor="middle" class="label-sm">PASSED / FAILED</text>
  
  <!-- Arrow to SonarQube -->
  <line x1="420" y1="230" x2="475" y2="230" class="arrow"/>
  
  <!-- PostgreSQL for SonarQube -->
  <rect x="540" y="360" width="160" height="50" class="box-db"/>
  <text x="620" y="385" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="620" y="400" text-anchor="middle" class="label-sm">sonarqube-db:5432</text>
  
  <!-- Arrow SonarQube to DB -->
  <line x1="620" y1="340" x2="620" y2="355" class="arrow"/>
  
  <!-- Commands -->
  <rect x="30" y="420" width="730" height="60" class="box" opacity="0.5"/>
  <text x="50" y="445" class="label-sm" fill="#a0a0a0">Comandos:</text>
  <text x="50" y="465" class="label-sm" fill="#ffffff">./scripts/run-sonar-analysis.sh start    # Iniciar SonarQube</text>
  <text x="380" y="465" class="label-sm" fill="#ffffff">./scripts/run-sonar-analysis.sh global   # Analisis completo</text>
</svg>
