<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0a192f"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg1)"/>
  
  <!-- Circuit pattern -->
  <g stroke="#1e3a5f" stroke-width="1" fill="none" opacity="0.4">
    <path d="M0 100 L200 100 L200 50 L350 50"/>
    <path d="M0 200 L150 200 L150 150 L300 150 L300 200 L400 200"/>
    <path d="M0 300 L100 300 L100 250 L250 250"/>
    <path d="M1584 80 L1400 80 L1400 130 L1300 130"/>
    <path d="M1584 180 L1450 180 L1450 230 L1350 230 L1350 180 L1250 180"/>
    <path d="M1584 320 L1500 320 L1500 280 L1400 280"/>
    <circle cx="350" cy="50" r="4" fill="#00d9ff"/>
    <circle cx="400" cy="200" r="4" fill="#00ff88"/>
    <circle cx="250" cy="250" r="4" fill="#00d9ff"/>
    <circle cx="1300" cy="130" r="4" fill="#00ff88"/>
    <circle cx="1250" cy="180" r="4" fill="#00d9ff"/>
    <circle cx="1400" cy="280" r="4" fill="#00ff88"/>
  </g>
  
  <!-- Code brackets decoration -->
  <text x="80" y="220" font-family="Consolas, monospace" font-size="180" fill="#00d9ff" opacity="0.15">{</text>
  <text x="1420" y="220" font-family="Consolas, monospace" font-size="180" fill="#00ff88" opacity="0.15">}</text>
  
  <!-- Main title -->
  <text x="792" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="url(#accent1)">El Parche Dev</text>
  
  <!-- Role -->
  <text x="792" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#ccd6f6">Full Stack Developer</text>
  
  <!-- Tagline -->
  <text x="792" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#8892b0" font-style="italic">« Construyendo el futuro »</text>
  
  <!-- Tech stack -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64ffda">
    <rect x="340" y="300" width="80" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="380" y="322" text-anchor="middle">React</text>
    
    <rect x="440" y="300" width="60" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="470" y="322" text-anchor="middle">Go</text>
    
    <rect x="520" y="300" width="80" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="560" y="322" text-anchor="middle">Python</text>
    
    <rect x="620" y="300" width="70" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="655" y="322" text-anchor="middle">Java</text>
    
    <rect x="710" y="300" width="50" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="735" y="322" text-anchor="middle">TS</text>
    
    <rect x="780" y="300" width="60" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="810" y="322" text-anchor="middle">SQL</text>
    
    <rect x="860" y="300" width="100" height="32" rx="4" fill="none" stroke="#00d9ff" stroke-width="2"/>
    <text x="910" y="322" text-anchor="middle" fill="#00d9ff">AI Enthusiast</text>
    
    <rect x="980" y="300" width="80" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="1020" y="322" text-anchor="middle">Docker</text>
    
    <rect x="1080" y="300" width="80" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="1120" y="322" text-anchor="middle">AWS</text>
    
    <rect x="1180" y="300" width="70" height="32" rx="4" fill="none" stroke="#64ffda" stroke-width="1.5"/>
    <text x="1215" y="322" text-anchor="middle">Linux</text>
  </g>
  
  <!-- Accent line -->
  <rect x="592" y="270" width="400" height="3" rx="1.5" fill="url(#accent1)" opacity="0.6"/>
</svg>