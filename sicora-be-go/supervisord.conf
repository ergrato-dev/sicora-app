[supervisord]
nodaemon=true
user=root
logfile=/var/log/sicora/supervisord.log
pidfile=/var/run/supervisord.pid

[program:userservice]
command=/app/userservice
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/sicora/userservice.log
stderr_logfile=/var/log/sicora/userservice_error.log
environment=PORT="8080",SERVICE_NAME="userservice"

