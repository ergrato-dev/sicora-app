basePath: /api/v1
definitions:
  evalinservice_internal_application_dtos.CreateEvaluationRequest:
    properties:
      instructor_id:
        type: string
      period_id:
        type: string
      questionnaire_id:
        type: string
      schedule_id:
        type: string
      student_id:
        type: string
    required:
    - instructor_id
    - period_id
    - questionnaire_id
    - schedule_id
    - student_id
    type: object
  evalinservice_internal_application_dtos.CreateQuestionRequest:
    properties:
      category:
        maxLength: 100
        minLength: 2
        type: string
      description:
        maxLength: 1000
        type: string
      is_required:
        type: boolean
      options:
        items:
          type: string
        type: array
      text:
        maxLength: 500
        minLength: 10
        type: string
      type:
        $ref: '#/definitions/evalinservice_internal_domain_valueobjects.QuestionType'
    required:
    - category
    - text
    - type
    type: object
  evalinservice_internal_application_dtos.EvaluationResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      id:
        type: string
      instructor_id:
        type: string
      instructor_name:
        type: string
      period_id:
        type: string
      period_name:
        type: string
      questionnaire_id:
        type: string
      questionnaire_name:
        type: string
      responses:
        additionalProperties: true
        type: object
      schedule_id:
        type: string
      score:
        type: number
      status:
        type: string
      student_id:
        type: string
      student_name:
        type: string
      updated_at:
        type: string
    type: object
  evalinservice_internal_application_dtos.EvaluationStatsResponse:
    properties:
      average_score:
        type: number
      completed_evaluations:
        type: integer
      completion_rate:
        type: number
      pending_evaluations:
        type: integer
      total_evaluations:
        type: integer
    type: object
  evalinservice_internal_application_dtos.QuestionResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_required:
        type: boolean
      options:
        items:
          type: string
        type: array
      order:
        type: integer
      text:
        type: string
      type:
        $ref: '#/definitions/evalinservice_internal_domain_valueobjects.QuestionType'
      updated_at:
        type: string
    type: object
  evalinservice_internal_application_dtos.UpdateEvaluationRequest:
    properties:
      responses:
        additionalProperties: true
        type: object
      status:
        type: string
    type: object
  evalinservice_internal_application_dtos.UpdateQuestionRequest:
    properties:
      category:
        maxLength: 100
        minLength: 2
        type: string
      description:
        maxLength: 1000
        type: string
      is_active:
        type: boolean
      is_required:
        type: boolean
      options:
        items:
          type: string
        type: array
      order:
        minimum: 0
        type: integer
      text:
        maxLength: 500
        minLength: 10
        type: string
    type: object
  evalinservice_internal_domain_valueobjects.QuestionType:
    enum:
    - LIKERT
    - TEXT
    - MULTIPLE_CHOICE
    - SINGLE_CHOICE
    - BOOLEAN
    type: string
    x-enum-comments:
      QuestionTypeBoolean: Sí/No
      QuestionTypeLikert: Escala 1-5
      QuestionTypeMultipleChoice: Selección múltiple
      QuestionTypeSingleChoice: Selección única
      QuestionTypeText: Respuesta libre
    x-enum-descriptions:
    - Escala 1-5
    - Respuesta libre
    - Selección múltiple
    - Selección única
    - Sí/No
    x-enum-varnames:
    - QuestionTypeLikert
    - QuestionTypeText
    - QuestionTypeMultipleChoice
    - QuestionTypeSingleChoice
    - QuestionTypeBoolean
  internal_presentation_handlers.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/internal_presentation_handlers.ErrorInfo'
      message:
        type: string
      meta:
        $ref: '#/definitions/internal_presentation_handlers.Meta'
      success:
        type: boolean
    type: object
  internal_presentation_handlers.ErrorInfo:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  internal_presentation_handlers.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
host: localhost:8004
info:
  contact:
    email: sicora@sena.edu.co
    name: SICORA Dev Team
    url: http://sicora.sena.edu.co
  description: Microservicio para evaluación de instructores - SICORA-APP
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: EvalinService API
  version: "1.0"
paths:
  /api/v1/evaluations:
    post:
      consumes:
      - application/json
      description: Crea una nueva evaluación para un instructor en un período específico
      parameters:
      - description: Datos de la evaluación
        in: body
        name: evaluation
        required: true
        schema:
          $ref: '#/definitions/evalinservice_internal_application_dtos.CreateEvaluationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Crear evaluación
      tags:
      - evaluations
  /api/v1/evaluations/{id}:
    get:
      description: Obtiene los detalles de una evaluación específica
      parameters:
      - description: ID de la evaluación
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener evaluación por ID
      tags:
      - evaluations
    put:
      consumes:
      - application/json
      description: Actualiza los datos de una evaluación existente
      parameters:
      - description: ID de la evaluación
        in: path
        name: id
        required: true
        type: string
      - description: Datos actualizados
        in: body
        name: evaluation
        required: true
        schema:
          $ref: '#/definitions/evalinservice_internal_application_dtos.UpdateEvaluationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Actualizar evaluación
      tags:
      - evaluations
  /api/v1/evaluations/{id}/submit:
    post:
      description: Marca una evaluación como completada y la envía
      parameters:
      - description: ID de la evaluación
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Enviar evaluación
      tags:
      - evaluations
  /api/v1/evaluations/instructor/{instructor_id}:
    get:
      description: Obtiene todas las evaluaciones de un instructor específico
      parameters:
      - description: ID del instructor
        in: path
        name: instructor_id
        required: true
        type: string
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Límite por página
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener evaluaciones por instructor
      tags:
      - evaluations
  /api/v1/evaluations/my:
    get:
      description: Obtiene todas las evaluaciones realizadas por el usuario actual
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Límite por página
        in: query
        name: limit
        type: integer
      - description: Filtrar por estado
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener mis evaluaciones
      tags:
      - evaluations
  /api/v1/evaluations/stats:
    get:
      description: Obtiene estadísticas generales de evaluaciones por período
      parameters:
      - description: ID del período
        in: query
        name: period_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.EvaluationStatsResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener estadísticas de evaluaciones
      tags:
      - evaluations
  /api/v1/questions:
    get:
      description: Obtiene una lista de preguntas con filtros opcionales
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Límite por página
        in: query
        name: limit
        type: integer
      - description: Filtrar por categoría
        in: query
        name: category
        type: string
      - description: Filtrar por estado activo
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener todas las preguntas
      tags:
      - questions
    post:
      consumes:
      - application/json
      description: Crea una nueva pregunta para evaluaciones
      parameters:
      - description: Datos de la pregunta
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/evalinservice_internal_application_dtos.CreateQuestionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Crear pregunta
      tags:
      - questions
  /api/v1/questions/{id}:
    delete:
      description: Elimina una pregunta del sistema (soft delete)
      parameters:
      - description: ID de la pregunta
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Eliminar pregunta
      tags:
      - questions
    get:
      description: Obtiene los detalles de una pregunta específica
      parameters:
      - description: ID de la pregunta
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener pregunta por ID
      tags:
      - questions
    put:
      consumes:
      - application/json
      description: Actualiza los datos de una pregunta existente
      parameters:
      - description: ID de la pregunta
        in: path
        name: id
        required: true
        type: string
      - description: Datos actualizados
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/evalinservice_internal_application_dtos.UpdateQuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Actualizar pregunta
      tags:
      - questions
  /api/v1/questions/active:
    get:
      description: Obtiene una lista de preguntas activas disponibles
      parameters:
      - description: Filtrar por categoría
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener preguntas activas
      tags:
      - questions
  /api/v1/questions/category/{category}:
    get:
      description: Obtiene preguntas filtradas por una categoría específica
      parameters:
      - description: Categoría de las preguntas
        in: path
        name: category
        required: true
        type: string
      - default: true
        description: Solo preguntas activas
        in: query
        name: active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_presentation_handlers.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/evalinservice_internal_application_dtos.QuestionResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_handlers.APIResponse'
      summary: Obtener preguntas por categoría
      tags:
      - questions
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
