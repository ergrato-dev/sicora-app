host: localhost:8002
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API para gestión de horarios académicos con operaciones bulk
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Schedule Service API
  version: "1.0"
paths:
  /schedules:
    get:
      consumes:
      - application/json
      description: Lista horarios con filtros opcionales y paginación
      parameters:
      - default: 1
        description: Número de página
        in: query
        name: page
        type: integer
      - default: 10
        description: Tamaño de página
        in: query
        name: page_size
        type: integer
      - description: Filtrar por grupo académico
        in: query
        name: academic_group_id
        type: string
      - description: Filtrar por instructor
        in: query
        name: instructor_id
        type: string
      - description: Filtrar por ambiente
        in: query
        name: venue_id
        type: string
      - description: Filtrar por día de la semana (1-7)
        in: query
        name: day_of_week
        type: integer
      - description: Filtrar por estado
        enum:
        - ACTIVE
        - CANCELLED
        - SUSPENDED
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.PaginatedResponse-scheduleservice_internal_application_dtos_ScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Listar horarios
      tags:
      - schedules
    post:
      consumes:
      - application/json
      description: Crea un nuevo horario en el sistema
      parameters:
      - description: Datos del horario
        in: body
        name: schedule
        required: true
        schema:
          $ref: '#/definitions/scheduleservice_internal_application_dtos.CreateScheduleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.ScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Crear horario
      tags:
      - schedules
  /schedules/{id}:
    delete:
      consumes:
      - application/json
      description: Elimina un horario del sistema
      parameters:
      - description: ID del horario
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Eliminar horario
      tags:
      - schedules
    get:
      consumes:
      - application/json
      description: Obtiene un horario específico por su ID
      parameters:
      - description: ID del horario
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.ScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Obtener horario
      tags:
      - schedules
    put:
      consumes:
      - application/json
      description: Actualiza un horario existente
      parameters:
      - description: ID del horario
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: schedule
        required: true
        schema:
          $ref: '#/definitions/scheduleservice_internal_application_dtos.UpdateScheduleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.ScheduleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Actualizar horario
      tags:
      - schedules
  /schedules/bulk:
    post:
      consumes:
      - application/json
      description: Crea múltiples horarios en una sola operación
      parameters:
      - description: Lista de horarios a crear
        in: body
        name: schedules
        required: true
        schema:
          $ref: '#/definitions/scheduleservice_internal_application_dtos.BulkCreateSchedulesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.BulkCreateSchedulesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Crear horarios masivamente
      tags:
      - schedules
      - bulk
  /schedules/upload-csv:
    post:
      consumes:
      - multipart/form-data
      description: Procesa un archivo CSV para crear múltiples horarios
      parameters:
      - description: Archivo CSV con horarios
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/scheduleservice_internal_application_dtos.CSVUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - BearerAuth: []
      summary: Cargar horarios desde CSV
      tags:
      - schedules
      - bulk
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
