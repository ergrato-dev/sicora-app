# =============================================================================
# SICORA - SonarQube Stack para Análisis de Código
# Ejecutar: docker compose -f docker-compose.sonarqube.yml up -d
# Dashboard: http://localhost:9000 (admin/admin en primer inicio)
# =============================================================================

services:
  # ==========================================================================
  # SonarQube Server
  # ==========================================================================
  sonarqube:
    image: sonarqube:lts-community
    container_name: sicora-sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonarqube
      - SONAR_JDBC_PASSWORD=sonarqube_secret
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sicora_sonar_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/api/system/status || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarqube.rule=Host(`sonar.localhost`)"
      - "traefik.http.services.sonarqube.loadbalancer.server.port=9000"

  # ==========================================================================
  # PostgreSQL for SonarQube
  # Nota: SonarQube LTS soporta PostgreSQL 11-16 oficialmente.
  # PostgreSQL 18 puede funcionar pero no está oficialmente soportado aún.
  # Si hay problemas, cambiar a postgres:16-alpine
  # ==========================================================================
  sonarqube-db:
    image: postgres:18-alpine
    container_name: sicora-sonarqube-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonarqube
      - POSTGRES_PASSWORD=sonarqube_secret
      - POSTGRES_DB=sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - sicora_sonar_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  sonarqube_data:
    name: sicora-sonarqube-data
  sonarqube_extensions:
    name: sicora-sonarqube-extensions
  sonarqube_logs:
    name: sicora-sonarqube-logs
  sonarqube_db_data:
    name: sicora-sonarqube-db-data

# =============================================================================
# Networks
# =============================================================================
networks:
  sicora_sonar_network:
    driver: bridge
    name: sicora-sonar-network
